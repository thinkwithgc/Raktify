<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background: cream with two soft red glows -->
  <defs>
    <radialGradient id="glow1" cx="0.95" cy="0.05" r="0.6">
      <stop offset="0%" stop-color="#dc2f1d" stop-opacity="0.16" />
      <stop offset="60%" stop-color="#dc2f1d" stop-opacity="0.04" />
      <stop offset="100%" stop-color="#dc2f1d" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="glow2" cx="0.05" cy="1.0" r="0.5">
      <stop offset="0%" stop-color="#dc2f1d" stop-opacity="0.10" />
      <stop offset="100%" stop-color="#dc2f1d" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="band" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#b8231a" />
      <stop offset="100%" stop-color="#f0563e" />
    </linearGradient>
    <linearGradient id="droplet" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0563e" />
      <stop offset="100%" stop-color="#b8231a" />
    </linearGradient>
    <filter id="dropshadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="14" />
      <feOffset dx="0" dy="8" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.18" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Cream base -->
  <rect width="1200" height="630" fill="#fdf8f4" />
  <!-- Subtle glows -->
  <rect width="1200" height="630" fill="url(#glow1)" />
  <rect width="1200" height="630" fill="url(#glow2)" />

  <!-- Top brand band -->
  <rect x="0" y="0" width="1200" height="14" fill="url(#band)" />

  <!-- Bottom thin rule -->
  <rect x="60" y="558" width="1080" height="1" fill="#ece0d3" />

  <!-- =================================================================
       LEFT COLUMN — wordmark + tagline (x: 80–760)
       ================================================================= -->

  <!-- Wordmark: "Rakt" red, "ı" stem + droplet, "fy" dark -->
  <!-- Position the baseline of the wordmark around y=240. Cap height ~110px. -->
  <g font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-weight="800" letter-spacing="-3">
    <!-- 'Rakt' -->
    <text x="80" y="245" font-size="148" fill="#b8231a">Rakt</text>
    <!-- 'ı' (dotless i) + drop sits where the tittle would be -->
    <text x="409" y="245" font-size="148" fill="#b8231a">&#x131;</text>
    <!-- Droplet replacing the tittle -->
    <g transform="translate(427, 95)" filter="url(#dropshadow)">
      <path d="M22 0 C 36 18 48 32 48 44 a 26 26 0 0 1 -52 0 C -4 32 8 18 22 0 Z"
            fill="url(#droplet)" />
    </g>
    <!-- 'fy' -->
    <text x="455" y="245" font-size="148" fill="#1c1917">fy</text>
  </g>

  <!-- Eyebrow chip -->
  <g transform="translate(80, 290)">
    <rect x="0" y="0" width="346" height="34" rx="17" fill="#ffe7e1" />
    <circle cx="20" cy="17" r="5" fill="#b8231a" />
    <text x="36" y="23" font-family="'Inter','Helvetica Neue',Arial,sans-serif"
          font-size="14" font-weight="700" fill="#b8231a" letter-spacing="0.6">
      A DIGITAL PUBLIC GOOD FOR BLOOD DONATION
    </text>
  </g>

  <!-- Primary tagline -->
  <g font-family="'Inter','Helvetica Neue',Arial,sans-serif">
    <text x="80" y="392" font-size="48" font-weight="800" fill="#1c1917" letter-spacing="-1.3">
      A mission-critical
    </text>
    <text x="80" y="450" font-size="48" font-weight="800" fill="#1c1917" letter-spacing="-1.3">
      operating system for
    </text>
    <text x="80" y="508" font-size="48" font-weight="800" fill="#b8231a" letter-spacing="-1.3">
      India&#8217;s bloodstream.
    </text>
  </g>

  <!-- Sub-line -->
  <text x="80" y="552" font-family="'Inter','Helvetica Neue',Arial,sans-serif"
        font-size="22" font-style="italic" font-weight="500" fill="#57534e">
    An operating system, not an app.
  </text>

  <!-- Foundation line -->
  <text x="80" y="600" font-family="'Inter','Helvetica Neue',Arial,sans-serif"
        font-size="14" font-weight="700" fill="#78716c" letter-spacing="2">
    CHOUDHARI EDUHEALTH INDIA FOUNDATION  ·  AMRAVATI
  </text>

  <!-- =================================================================
       RIGHT COLUMN — large droplet visual (x: 820–1180)
       ================================================================= -->

  <!-- Soft cream-on-cream card -->
  <rect x="800" y="80" width="340" height="460" rx="26" fill="#ffffff" opacity="0.6"
        stroke="#f5ece4" stroke-width="1.5" />

  <!-- Concentric rings behind the droplet -->
  <g stroke="#b8231a" fill="none" opacity="0.10">
    <circle cx="970" cy="310" r="160" stroke-width="1.5" />
    <circle cx="970" cy="310" r="120" stroke-width="1.5" />
    <circle cx="970" cy="310" r="80" stroke-width="1.5" />
  </g>

  <!-- The big droplet -->
  <g transform="translate(970, 175)" filter="url(#dropshadow)">
    <path d="M0 0 C 85 100 132 185 132 240 a 132 132 0 0 1 -264 0 C -132 185 -85 100 0 0 Z"
          fill="url(#droplet)" />
    <!-- Tiny highlight -->
    <ellipse cx="-44" cy="200" rx="20" ry="36" fill="#ffffff" opacity="0.22" />
  </g>

  <!-- Tagline strip below droplet -->
  <text x="970" y="520" text-anchor="middle"
        font-family="'Inter','Helvetica Neue',Arial,sans-serif"
        font-size="14" font-weight="700" letter-spacing="2.5" fill="#b8231a">
    BLOOD  ·  TIME  ·  TRUST
  </text>

</svg>
