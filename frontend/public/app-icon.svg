<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <radialGradient id="bg" cx="0.3" cy="0.25" r="0.95">
      <stop offset="0%" stop-color="#dc2f1d" />
      <stop offset="55%" stop-color="#b8231a" />
      <stop offset="100%" stop-color="#7c1d1b" />
    </radialGradient>
    <linearGradient id="droplet" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1" />
      <stop offset="100%" stop-color="#ffe7e1" stop-opacity="1" />
    </linearGradient>
    <filter id="ds" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="22" />
      <feOffset dx="0" dy="18" result="off" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.35" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Rounded-square brand red background (Apple/Android icon convention) -->
  <rect width="1024" height="1024" rx="220" ry="220" fill="url(#bg)" />

  <!-- Three concentric ring marks behind the droplet (subtle, brand pulse) -->
  <g stroke="#ffffff" fill="none" opacity="0.08">
    <circle cx="512" cy="540" r="380" stroke-width="6" />
    <circle cx="512" cy="540" r="290" stroke-width="6" />
    <circle cx="512" cy="540" r="200" stroke-width="6" />
  </g>

  <!-- The droplet — centred and slightly low so a future "by Choudhari Foundation"
       line could sit underneath if we ever need it for store-listing variants. -->
  <g transform="translate(512, 245)" filter="url(#ds)">
    <path
      d="M0 0
         C 170 200 264 370 264 480
         a 264 264 0 0 1 -528 0
         C -264 370 -170 200 0 0 Z"
      fill="url(#droplet)"
    />
    <!-- Subtle inner highlight to give the droplet form, not just a flat shape -->
    <ellipse cx="-88" cy="400" rx="40" ry="72" fill="#ffffff" opacity="0.28" />
  </g>

  <!-- Tiny "R" mark inset on the droplet to make the icon recognisable at 32×32. -->
  <text
    x="512"
    y="660"
    text-anchor="middle"
    font-family="Inter, 'Helvetica Neue', Arial, sans-serif"
    font-size="240"
    font-weight="900"
    letter-spacing="-8"
    fill="#b8231a"
    opacity="0.92"
  >R</text>
</svg>
