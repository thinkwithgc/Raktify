  <g transform="translate(124 132) scale(32.4)">
    <path d="M12 2.5c4 4.8 7 8.3 7 11.5a7 7 0 0 1-14 0c0-3.2 3-6.7 7-11.5Z" fill="#fff" />
  </g>
  <circle cx="512" cy="624" r="96" fill="#b8231a" />
</svg>
